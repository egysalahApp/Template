<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قالب تعليمي ذكي</title>
    
    <!-- خط Readex Pro -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- مكتبة Tailwind CSS فقط -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { 
            font-family: 'Readex Pro', sans-serif; 
            background-color: #f8fafc;
            color: #0f172a; 
            -webkit-tap-highlight-color: transparent;
        }
        
        html { scroll-behavior: smooth; }
        
        /* حركات الظهور والسقوط للصناديق */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fly-out { animation: flyOut 0.4s ease-in forwards; }
        @keyframes flyOut {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(120px) scale(0.5); opacity: 0; }
        }

        /* حركة التمدد السلس للمعالجة البصرية */
        .smooth-expand { animation: smoothExpand 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; overflow: hidden; }
        @keyframes smoothExpand {
            0% { max-height: 0; opacity: 0; transform: translateY(-10px); }
            100% { max-height: 500px; opacity: 1; transform: translateY(0); }
        }
        
        button { outline: none; }
        
        /* إخفاء شريط التمرير للتبويبات لجمالية التصميم */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="selection:bg-violet-200 flex flex-col min-h-screen">

    <!-- حاوية التطبيق الرئيسية -->
    <div id="app-root" class="flex-grow flex flex-col"></div>

    <script>
        // ================= الأيقونات (SVG Strings) =================
        // يمكنك استخدام هذه الأيقونات داخل APP_DATA
        const ICONS = {
            youtube: `<svg class="w-7 h-7" fill="#FF0000" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418 c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768 C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.86-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M10,15.464V8.536L16,12L10,15.464z"/></svg>`,
            checkCircle: `<svg class="w-6 h-6 md:w-7 md:h-7 shrink-0 text-emerald-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`,
            checkCircleLarge: `<svg class="w-7 h-7 md:w-8 md:h-8 text-emerald-700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`,
            xCircle: `<svg class="w-6 h-6 md:w-7 md:h-7 shrink-0 text-rose-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`,
            xCircleLarge: `<svg class="w-7 h-7 md:w-8 md:h-8 text-rose-700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`,
            refresh: `<svg class="w-5 h-5 md:w-6 md:h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>`,
            arrowLeft: `<svg class="w-5 h-5 md:w-6 md:h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>`,
            medal: `<svg class="w-24 h-24 md:w-32 md:h-32 mx-auto text-amber-400 mb-6 drop-shadow-md" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>`,
            hidden: `<svg class="w-10 h-10 text-amber-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle><line x1="3" y1="3" x2="21" y2="21"></line></svg>`,
            loud: `<svg class="w-10 h-10 text-violet-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`,
            scene: `<svg class="w-10 h-10 text-cyan-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>`,
            tray: `<svg class="w-8 h-8 md:w-12 md:h-12 mb-2 md:mb-3 opacity-80" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>`
        };

        // ================= قاعدة البيانات المركزية (APP_DATA) =================
        // يمكنك تعديل هذا الكائن فقط لإنشاء أي درس جديد
        // أنواع الأقسام المتاحة (type): intro, mcq, true_false, spotting, classify
        const APP_DATA = {
            pageTitle: "الاستعارة | قالب ذكي",
            headerTitle: "العربية السهلة",
            headerSubtitle: "محمود صلاح",
            youtubeLink: "https://www.youtube.com/egysalah",
            copyright: "جميع الحقوق محفوظة لقناة العربية السهلة",
            
            sections: [
                // 1. قسم الشرح والمقدمة
                {
                    id: "intro",
                    type: "intro",
                    title: "قبل أن نبدأ",
                    theme: "amber",
                    content: [
                        {
                            title: "١. الاستعارة المكنية",
                            text: "هي التي نَحْذِفُ فيها (المشبه به) ونأتي بصفة من صفاته تدل عليه.<br><span class='text-amber-600 font-semibold'>مثال:</span> طار الخبر في المدينة.",
                            icon: ICONS.hidden,
                            theme: "amber"
                        }
                    ]
                },
                // 2. قسم الاختيار من متعدد
                {
                    id: "mcq_test",
                    type: "mcq",
                    title: "اختر الإجابة",
                    theme: "violet",
                    questions: [
                        { 
                            text: "«ابتسمت الفرصة للشاب الطموح»\nما نوع الاستعارة هنا؟", 
                            options: ["مكنية", "تصريحية", "تمثيلية"], 
                            correct: 0, 
                            explanation: "لأنه شبه (الفرصة) بإنسان يبتسم، وحذف المشبه به.", 
                            hint: "الفرصة لا تبتسم، من الذي يبتسم وحذفناه؟" 
                        }
                    ]
                },
                // 3. قسم الصح والخطأ
                {
                    id: "tf_test",
                    type: "true_false",
                    title: "صواب وخطأ",
                    theme: "rose",
                    questions: [
                        { 
                            text: "الاستعارة المكنية هي التي يُحذف فيها المشبه به، ونأتي بصفة من صفاته.", 
                            answer: true, 
                            explanation: "لأننا نُخفي المشبه به ونأتي بصفة، مثل: (بكى السحاب).", 
                            hint: "مكنية = مخفية." 
                        }
                    ]
                },
                // 4. قسم صياد الكلمات
                {
                    id: "spotting_test",
                    type: "spotting",
                    title: "صياد الكلمات",
                    theme: "indigo",
                    questions: [
                        { 
                            words: ["تبتسم", "الزهور", "في", "الربيع"], 
                            correctIndex: 0, 
                            explanation: "الاستعارة في (تبتسم)، شبه الزهور بإنسان وحذف المشبه به.", 
                            hint: "صفة بشرية أُعطيت للزهور." 
                        }
                    ]
                },
                // 5. قسم التصنيف
                {
                    id: "classify_test",
                    type: "classify",
                    title: "التصنيف",
                    theme: "cyan",
                    categories: [
                        { id: 'makneya', label: 'مكنية', theme: 'amber' },
                        { id: 'tasreheya', label: 'تصريحية', theme: 'violet' },
                        { id: 'tamtheleya', label: 'تمثيلية', theme: 'cyan' }
                    ],
                    questions: [
                        { 
                            text: "بكى السحاب على الأرض العطشى", 
                            categoryId: "makneya", 
                            explanation: "شبه السحاب بإنسان يبكي، وحذف المشبه به.", 
                            hint: "السحاب لا يبكي، هناك إنسان مخفي." 
                        }
                    ]
                }
            ]
        };

        // ================= الأداة اللغوية =================
        const toArabicNum = (num) => {
            const arabicNumbers = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
            return String(num).split('').map(c => arabicNumbers[c] || c).join('');
        };

        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        // ================= كائن التطبيق الرئيسي =================
        const App = {
            state: {
                activeTab: '',
                progress: {},
                sectionData: {} // لتخزين بيانات كل قسم أثناء اللعب (مثل الإجابات المختارة)
            },

            init() {
                // ضبط عنوان الصفحة من البيانات
                document.title = APP_DATA.pageTitle;
                
                // تهيئة البيانات والتبويب الافتراضي
                if (APP_DATA.sections.length > 0) {
                    this.state.activeTab = APP_DATA.sections[0].id;
                }
                
                this.initSectionData();
                this.renderLayout();
                this.updateUI();
            },

            // تهيئة بيانات الحالة الديناميكية بناءً على APP_DATA
            initSectionData() {
                this.state.progress = {};
                this.state.sectionData = {};

                APP_DATA.sections.forEach(sec => {
                    if (sec.type === 'intro') {
                        this.state.progress[sec.id] = { answered: 0, total: 0, score: 0 };
                    } 
                    else if (sec.type === 'mcq') {
                        this.state.progress[sec.id] = { answered: 0, total: sec.questions.length, score: 0 };
                        this.state.sectionData[sec.id] = shuffleArray(sec.questions).map(q => ({
                            originalQuestion: q,
                            options: q.options.map((opt, oIdx) => ({ text: opt, isCorrect: oIdx === q.correct })),
                            answered: false, selectedOption: null, showHint: false
                        }));
                    } 
                    else if (sec.type === 'true_false') {
                        this.state.progress[sec.id] = { answered: 0, total: sec.questions.length, score: 0 };
                        this.state.sectionData[sec.id] = shuffleArray(sec.questions).map(q => ({
                            originalQuestion: q,
                            options: [
                                { text: "صواب", isCorrect: true === q.answer },
                                { text: "خطأ", isCorrect: false === q.answer }
                            ],
                            answered: false, selectedOption: null, showHint: false
                        }));
                    } 
                    else if (sec.type === 'spotting') {
                        this.state.progress[sec.id] = { answered: 0, total: sec.questions.length, score: 0 };
                        this.state.sectionData[sec.id] = shuffleArray(sec.questions).map(q => ({
                            originalQuestion: q, answered: false, selectedIndex: null, showHint: false
                        }));
                    } 
                    else if (sec.type === 'classify') {
                        this.state.progress[sec.id] = { answered: 0, total: sec.questions.length, score: 0 };
                        let boxCounts = {};
                        sec.categories.forEach(c => boxCounts[c.id] = 0);
                        
                        this.state.sectionData[sec.id] = {
                            questions: shuffleArray(sec.questions).map(q => ({ originalQuestion: q, showHint: false })),
                            currentIndex: 0, status: 'idle', boxCounts: boxCounts, animatingOut: false
                        };
                    }
                });
            },

            // إنشاء الهيكل الأساسي للصفحة
            renderLayout() {
                const root = document.getElementById('app-root');
                
                // توليد حاويات الأقسام ديناميكياً
                let sectionsContainers = '';
                APP_DATA.sections.forEach(sec => {
                    sectionsContainers += `<div id="section-${sec.id}" class="hidden"></div>`;
                });

                root.innerHTML = `
                    <div id="main-header" class="w-full text-center py-6 bg-transparent">
                        <a href="${APP_DATA.youtubeLink}" target="_blank" rel="noopener noreferrer" 
                           class="inline-flex items-center justify-center gap-2 text-2xl font-bold text-slate-900 mb-1">
                            <span>${APP_DATA.headerTitle}</span>
                            ${ICONS.youtube}
                        </a>
                        <h2 class="text-lg font-bold text-slate-500">${APP_DATA.headerSubtitle}</h2>
                    </div>
                    
                    <div id="sticky-tabs-container" class="sticky top-0 z-50 bg-[#f8fafc]/95 backdrop-blur-md shadow-sm border-b border-slate-200">
                        <div id="tabs-container" class="mx-auto w-max max-w-full overflow-x-auto px-4 no-scrollbar scroll-smooth">
                            <div id="tabs-wrapper" class="flex items-center gap-3 py-3 flex-nowrap"></div>
                        </div>
                        <div class="w-full h-[4px] bg-slate-200">
                            <div id="progress-bar" class="h-full transition-all duration-500 ease-out" style="width: 0%"></div>
                        </div>
                    </div>
                    
                    <main class="container mx-auto px-4 py-8 max-w-4xl flex-grow">
                        <div id="scroll-target" class="scroll-mt-20"></div>
                        ${sectionsContainers}
                        <div id="final-evaluation-container"></div>
                    </main>

                    <footer class="mt-auto py-8 bg-white border-t border-slate-200 text-center">
                        <a href="${APP_DATA.youtubeLink}" target="_blank" rel="noopener noreferrer" class="text-slate-400 text-sm font-medium block w-full">
                            ${APP_DATA.copyright}
                        </a>
                    </footer>
                `;
            },

            updateUI() {
                this.updateTabs();
                
                // إظهار القسم النشط وتحديث محتواه
                APP_DATA.sections.forEach(sec => {
                    const el = document.getElementById(`section-${sec.id}`);
                    if (el) {
                        if (this.state.activeTab === sec.id) {
                            el.className = 'block';
                            el.innerHTML = this.renderSection(sec);
                        } else {
                            el.className = 'hidden';
                        }
                    }
                });

                this.checkFinalEvaluation();
            },

            updateTabs() {
                const wrapper = document.getElementById('tabs-wrapper');
                let html = '';
                
                APP_DATA.sections.forEach(section => {
                    const isActive = this.state.activeTab === section.id;
                    const secProgress = this.state.progress[section.id];
                    const isDone = secProgress.total > 0 && secProgress.answered === secProgress.total;
                    
                    let activeClass = isActive ? `bg-${section.theme}-600 text-white border-${section.theme}-600 shadow-md` : "bg-white text-slate-600 border-slate-200";

                    html += `
                        <button id="tab-${section.id}" type="button" onclick="App.handleTabChange('${section.id}')" 
                                class="shrink-0 whitespace-nowrap px-6 py-2 rounded-full font-semibold text-lg md:text-xl border-2 transition-all flex items-center justify-center gap-2 ${activeClass}">
                            ${section.title}
                            ${isDone && !isActive ? ICONS.checkCircle : ''}
                        </button>
                    `;
                });
                
                wrapper.innerHTML = html;

                const currentProgress = this.state.progress[this.state.activeTab];
                const progressPercent = currentProgress && currentProgress.total > 0 ? (currentProgress.answered / currentProgress.total) * 100 : 0;
                const progressBar = document.getElementById('progress-bar');
                const theme = APP_DATA.sections.find(s => s.id === this.state.activeTab).theme;
                
                progressBar.className = `h-full transition-all duration-500 ease-out bg-${theme}-500`;
                progressBar.style.width = `${progressPercent}%`;
            },

            // ================= دوال التوليد (Rendering) =================
            
            // الدالة الموزعة للأنشطة بناء على النوع
            renderSection(sectionData) {
                switch(sectionData.type) {
                    case 'intro': return this.renderIntro(sectionData);
                    case 'mcq': 
                    case 'true_false': return this.renderStandardSection(sectionData);
                    case 'spotting': return this.renderStandardSection(sectionData);
                    case 'classify': return this.renderClassify(sectionData);
                    default: return '';
                }
            },

            renderIntro(sectionData) {
                let blocksHTML = '';
                sectionData.content.forEach(block => {
                    blocksHTML += `
                        <div class="bg-white p-6 md:p-8 rounded-2xl border-2 border-${block.theme}-100 shadow-sm flex flex-col md:flex-row items-start text-right gap-4 md:gap-6">
                            <div class="bg-${block.theme}-100 p-4 rounded-full shrink-0 text-${block.theme}-600">${block.icon || ''}</div>
                            <div>
                                <h3 class="text-2xl font-semibold text-slate-700 mb-3">${block.title}</h3>
                                <p class="text-xl text-slate-600 leading-relaxed">${block.text}</p>
                            </div>
                        </div>
                    `;
                });

                return `
                    <div class="max-w-3xl mx-auto space-y-6 fade-in">
                        <h1 class="text-center text-2xl md:text-3xl font-semibold text-slate-700 mb-8">${APP_DATA.pageTitle.split('|')[0]}</h1>
                        ${blocksHTML}
                        <div class="flex justify-center mt-10 pt-4">
                            <button onclick="App.handleNextSection()" class="bg-emerald-600 text-white font-semibold text-xl py-4 px-12 rounded-full shadow-md flex items-center gap-3 active:scale-95 transition-transform">
                                هيا نبدأ التدريبات ${ICONS.arrowLeft}
                            </button>
                        </div>
                    </div>
                `;
            },

            // تدير قسم الخيارات المتعددة، الصح والخطأ، وصياد الكلمات
            renderStandardSection(sectionData) {
                const sectionId = sectionData.id;
                const progress = this.state.progress[sectionId];
                const isComplete = progress.total > 0 && progress.answered === progress.total;
                const questions = this.state.sectionData[sectionId];
                
                let html = '<div class="fade-in">';
                
                questions.forEach((qState, idx) => {
                    html += `<div id="${sectionId}-wrapper-${idx}">`;
                    if (sectionData.type === 'spotting') {
                        html += this.renderSpottingCard(qState, idx, sectionData.theme, sectionId);
                    } else {
                        html += this.renderQuestionCard(qState, idx, sectionId, sectionData.theme, sectionData.type);
                    }
                    html += `</div>`;
                });

                if (isComplete) {
                    html += `
                        <div class="mt-12 p-8 md:p-10 bg-white border-2 border-${sectionData.theme}-200 rounded-2xl shadow-sm text-center max-w-2xl mx-auto w-full">
                            <h3 class="text-2xl md:text-3xl font-semibold text-slate-700 mb-6">نتيجتك في قسم (${sectionData.title})</h3>
                            <div class="text-5xl font-bold text-${sectionData.theme}-600" style="direction: ltr">
                                ${toArabicNum(progress.score)} <span class="text-4xl text-slate-300 font-medium">/</span> ${toArabicNum(progress.total)}
                            </div>
                        </div>
                    `;
                }
                
                html += '</div>'; 
                html += this.renderSectionFooterControls(sectionId, isComplete);
                return html;
            },

            renderQuestionCard(qState, idx, sectionId, theme, type) {
                const { originalQuestion: q, options, answered, selectedOption, showHint } = qState;
                const isSelectedCorrect = selectedOption && selectedOption.isCorrect;
                
                const hintFadeClass = qState.hintAnimate ? 'smooth-expand' : '';
                const answerFadeClass = qState.answerAnimate ? 'smooth-expand' : '';
                
                let ringClass = answered ? (isSelectedCorrect ? 'ring-2 ring-emerald-400' : 'ring-2 ring-rose-400') : '';

                let optionsHTML = '';
                options.forEach((opt, optIdx) => {
                    let btnClass = `w-full p-4 md:p-5 rounded-xl border-2 transition-all font-semibold text-xl md:text-2xl flex items-center gap-3 ${type === 'mcq' ? 'justify-start' : 'justify-center'} `;
                    
                    if (!answered) {
                        btnClass += `border-slate-200 bg-white text-slate-600 active:scale-95 hover:bg-slate-50 cursor-pointer`;
                    } else {
                        if (opt.isCorrect) btnClass += "bg-emerald-50 border-emerald-500 text-emerald-800 shadow-sm";
                        else if (selectedOption === opt) btnClass += "bg-rose-50 border-rose-500 text-rose-800 shadow-sm";
                        else btnClass += "bg-slate-50 border-slate-100 text-slate-400 opacity-60";
                        btnClass += " cursor-default";
                    }

                    let numberingHTML = '';
                    if (type === 'mcq') {
                        let numClass = `w-8 h-8 md:w-10 md:h-10 flex items-center justify-center rounded-full text-xl md:text-2xl font-bold shrink-0 transition-colors `;
                        if (answered) numClass += opt.isCorrect ? 'bg-emerald-200 text-emerald-800' : (selectedOption === opt ? 'bg-rose-200 text-rose-800' : 'bg-slate-200 text-slate-500');
                        else numClass += `bg-${theme}-100 text-${theme}-700`;
                        numberingHTML = `<div class="${numClass}">${toArabicNum(optIdx + 1)}</div>`;
                    }

                    optionsHTML += `
                        <button ${answered ? 'disabled' : ''} onclick="App.handleAnswer('${sectionId}', ${idx}, ${optIdx})" class="${btnClass}">
                            ${numberingHTML}
                            <span class="relative z-10 flex-grow text-right">${opt.text}</span>
                            ${answered && opt.isCorrect ? ICONS.checkCircle : ''}
                            ${answered && selectedOption === opt && !opt.isCorrect ? ICONS.xCircle : ''}
                        </button>
                    `;
                });

                return `
                    <div id="${sectionId}-q-${idx}" class="bg-white rounded-2xl p-5 md:p-6 shadow-sm border border-slate-200 mb-8 relative transition-colors duration-300 flex flex-col justify-start ${ringClass}">
                        <div class="bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-100 mb-6 w-full mx-auto">
                            <div class="flex items-center justify-between mb-2 md:mb-3">
                                <span class="bg-${theme}-100 text-${theme}-700 font-bold px-4 py-1.5 rounded-full text-lg md:text-xl">
                                    السؤال ${toArabicNum(idx + 1)}
                                </span>
                                <button onclick="App.toggleHint('${sectionId}', ${idx})" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-lg md:text-xl font-bold transition-all active:scale-95 text-amber-500 hover:bg-amber-50">
                                    💡 تلميح
                                </button>
                            </div>
                            <h3 class="text-2xl md:text-3xl font-bold text-slate-800 leading-snug whitespace-pre-line text-right">${q.text}</h3>

                            <div class="${showHint ? `block w-full ${hintFadeClass}` : 'hidden'}">
                                <div class="mt-4 bg-amber-50 text-amber-900 p-4 rounded-xl text-xl font-medium border border-amber-200 flex gap-2 items-start text-right">
                                    <span class="text-amber-500 font-semibold mt-1 shrink-0">💡</span>
                                    <span class="leading-relaxed">${q.hint}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="grid gap-3 mx-auto w-full max-w-md flex-grow grid-cols-1 content-start">
                            ${optionsHTML}
                        </div>
                        
                        <div class="${answered ? `block w-full ${answerFadeClass}` : 'hidden'}">
                            <div class="mt-6 p-5 rounded-xl border text-right ${isSelectedCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}">
                                <div class="flex items-center justify-start gap-2 mb-3 font-bold text-xl md:text-2xl ${isSelectedCorrect ? 'text-emerald-700' : 'text-rose-700'}">
                                    ${isSelectedCorrect ? ICONS.checkCircleLarge : ICONS.xCircleLarge}
                                    <span>${isSelectedCorrect ? 'إجابة صحيحة' : 'إجابة خاطئة'}</span>
                                </div>
                                <div class="text-xl md:text-2xl font-semibold leading-relaxed ${isSelectedCorrect ? 'text-emerald-800' : 'text-rose-800'} pr-1">
                                    ${q.explanation}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderSpottingCard(qState, idx, theme, sectionId) {
                const { originalQuestion: q, answered, selectedIndex, showHint } = qState;
                const isCorrectAnswer = selectedIndex === q.correctIndex;
                const hintFadeClass = qState.hintAnimate ? 'smooth-expand' : '';
                const answerFadeClass = qState.answerAnimate ? 'smooth-expand' : '';
                let ringClass = answered ? (isCorrectAnswer ? 'ring-2 ring-emerald-400' : 'ring-2 ring-rose-400') : '';

                let wordsHTML = '';
                q.words.forEach((word, wIdx) => {
                    const isSelected = selectedIndex === wIdx;
                    const isCorrect = wIdx === q.correctIndex;
                    let wordClass = "px-4 md:px-6 py-3 md:py-4 text-2xl md:text-3xl font-bold rounded-xl transition-all duration-300 select-none ";
                    
                    if (!answered) {
                        wordClass += `bg-white border-2 border-slate-200 text-slate-700 hover:border-${theme}-300 hover:bg-${theme}-50 hover:-translate-y-1 hover:shadow-md active:scale-95 cursor-pointer`;
                    } else {
                        if (isSelected && isCorrect) wordClass += "bg-emerald-500 text-white border-2 border-emerald-600 shadow-md scale-105";
                        else if (isSelected && !isCorrect) wordClass += "bg-rose-500 text-white border-2 border-rose-600 shadow-md scale-105";
                        else if (!isSelected && isCorrect) wordClass += "bg-emerald-50 text-emerald-700 border-2 border-emerald-300 ring-2 ring-emerald-200";
                        else wordClass += "bg-slate-50 border-2 border-slate-100 text-slate-400 opacity-50 cursor-default";
                    }

                    wordsHTML += `<span onclick="App.handleSpottingClick('${sectionId}', ${idx}, ${wIdx})" class="${wordClass}">${word}</span>`;
                });

                return `
                    <div id="${sectionId}-q-${idx}" class="bg-white rounded-2xl p-5 md:p-6 shadow-sm border border-slate-200 mb-8 relative transition-colors duration-300 flex flex-col justify-start ${ringClass}">
                        <div class="bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-100 mb-6 w-full mx-auto">
                            <div class="flex items-center justify-between mb-2 md:mb-3">
                                <span class="bg-${theme}-100 text-${theme}-700 font-bold px-4 py-1.5 rounded-full text-lg md:text-xl">
                                    السؤال ${toArabicNum(idx + 1)}
                                </span>
                                <button onclick="App.toggleHint('${sectionId}', ${idx})" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-lg md:text-xl font-bold transition-all active:scale-95 text-amber-500 hover:bg-amber-50">
                                    💡 تلميح
                                </button>
                            </div>
                            <p class="text-right text-slate-700 font-semibold text-xl md:text-2xl leading-snug">انقر على الكلمة الصحيحة في الجملة الآتية:</p>
                            <div class="${showHint ? `block w-full ${hintFadeClass}` : 'hidden'}">
                                <div class="mt-4 bg-amber-50 text-amber-900 p-4 rounded-xl text-xl font-medium border border-amber-200 flex gap-2 items-start text-right">
                                    <span class="text-amber-500 font-semibold mt-1 shrink-0">💡</span>
                                    <span class="leading-relaxed">${q.hint}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-wrap justify-center items-center gap-3 md:gap-4 leading-loose mx-auto w-full max-w-lg">
                            ${wordsHTML}
                        </div>
                        <div class="${answered ? `block w-full ${answerFadeClass}` : 'hidden'}">
                            <div class="mt-6 p-5 rounded-xl border text-right ${isCorrectAnswer ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}">
                                <div class="flex items-center justify-start gap-2 mb-3 font-bold text-xl md:text-2xl ${isCorrectAnswer ? 'text-emerald-700' : 'text-rose-700'}">
                                    ${isCorrectAnswer ? ICONS.checkCircleLarge : ICONS.xCircleLarge}
                                    <span>${isCorrectAnswer ? 'إجابة صحيحة' : 'إجابة خاطئة'}</span>
                                </div>
                                <div class="text-xl md:text-2xl font-semibold leading-relaxed ${isCorrectAnswer ? 'text-emerald-800' : 'text-rose-800'} pr-1">
                                    ${q.explanation}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderClassify(sectionData) {
                const sectionId = sectionData.id;
                const theme = sectionData.theme;
                const state = this.state.sectionData[sectionId];
                const { questions, currentIndex, status, boxCounts, animatingOut } = state;
                const isComplete = currentIndex >= questions.length;
                
                let html = '';

                if (!isComplete && questions[currentIndex]) {
                    const currentQuestion = questions[currentIndex].originalQuestion;
                    const showHint = questions[currentIndex].showHint;
                    const hintFadeClass = questions[currentIndex].hintAnimate ? 'smooth-expand' : '';
                    const feedbackFadeClass = state.feedbackAnimate ? 'smooth-expand' : '';
                    
                    let boxesHTML = '';
                    sectionData.categories.forEach(b => {
                        let btnClass = `flex-1 flex flex-col items-center justify-center p-3 md:p-6 border-2 md:border-4 rounded-2xl md:rounded-3xl transition-all duration-300 border-${b.theme}-200 text-${b.theme}-700 bg-${b.theme}-50 `;
                        if (status === 'idle') {
                            btnClass += `hover:border-${b.theme}-400 hover:bg-${b.theme}-100 hover:-translate-y-2 cursor-pointer shadow-sm hover:shadow-md`;
                        } else {
                            btnClass += `opacity-60 cursor-default grayscale-[30%]`;
                        }
                        
                        boxesHTML += `
                            <button ${status !== 'idle' ? 'disabled' : ''} onclick="App.handleSortClick('${sectionId}', '${b.id}')" class="${btnClass}">
                                ${ICONS.tray}
                                <span class="font-bold text-xl md:text-2xl mb-2 md:mb-3">${b.label}</span>
                                <div class="bg-white/90 px-4 md:px-5 py-1 rounded-full shadow-inner font-black text-xl border border-white/50">
                                    ${toArabicNum(boxCounts[b.id])}
                                </div>
                            </button>
                        `;
                    });

                    html += `
                        <div class="flex flex-col items-center w-full">
                            <div class="w-full bg-white p-5 md:p-6 rounded-3xl shadow-lg border-2 border-slate-200 transition-colors duration-300 relative z-10 flex flex-col justify-start ${animatingOut ? 'fly-out' : 'fade-in'}">
                                <div class="bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-100 mb-6 w-full mx-auto">
                                    <div class="flex items-center justify-between mb-2 md:mb-3">
                                        <span class="bg-${theme}-100 text-${theme}-700 font-bold px-4 py-1.5 rounded-full text-lg md:text-xl">
                                            البطاقة ${toArabicNum(currentIndex + 1)}
                                        </span>
                                        <button onclick="App.toggleHint('${sectionId}', ${currentIndex})" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-lg md:text-xl font-bold transition-all active:scale-95 text-amber-500 hover:bg-amber-50">
                                            💡 تلميح
                                        </button>
                                    </div>
                                    <h3 class="text-2xl md:text-3xl font-bold leading-snug text-slate-800 text-right">«${currentQuestion.text}»</h3>
                                    <div class="${showHint ? `block w-full ${hintFadeClass}` : 'hidden'}">
                                        <div class="mt-4 bg-amber-50 text-amber-900 p-4 rounded-xl text-xl font-medium border border-amber-200 flex gap-2 items-start text-right">
                                            <span class="text-amber-500 font-semibold mt-1 shrink-0">💡</span>
                                            <span class="leading-relaxed">${currentQuestion.hint}</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="${status !== 'idle' ? `block w-full ${feedbackFadeClass}` : 'hidden'}">
                                    <div class="mt-2 mb-4 p-5 rounded-2xl border text-right ${status === 'correct' ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}">
                                        <div class="flex items-center justify-start gap-2 mb-3 font-bold text-xl md:text-2xl ${status === 'correct' ? 'text-emerald-700' : 'text-rose-700'}">
                                            ${status === 'correct' ? ICONS.checkCircleLarge : ICONS.xCircleLarge}
                                            <span>${status === 'correct' ? 'إجابة صحيحة' : 'إجابة خاطئة'}</span>
                                        </div>
                                        <div class="text-xl md:text-2xl font-semibold leading-relaxed mb-6 ${status === 'correct' ? 'text-emerald-800' : 'text-rose-800'} pr-1">
                                            ${currentQuestion.explanation}
                                        </div>
                                        <div class="flex justify-center mt-4">
                                            <button onclick="App.handleSortContinue('${sectionId}')" class="px-10 py-3 text-white font-bold text-xl md:text-2xl rounded-full active:scale-95 transition-transform shadow-md ${status === 'correct' ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-rose-600 hover:bg-rose-700'}">
                                                متابعة
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex flex-row w-full max-w-lg mx-auto gap-2 md:gap-4 mt-2 relative z-0">
                                    ${boxesHTML}
                                </div>
                            </div>
                        </div>
                    `;
                }

                if (isComplete) {
                    const progress = this.state.progress[sectionId];
                    html += `
                        <div class="mt-12 p-8 md:p-10 bg-white border-2 border-${theme}-200 rounded-2xl shadow-sm text-center fade-in max-w-2xl mx-auto w-full">
                            <h3 class="text-2xl md:text-3xl font-semibold text-slate-700 mb-6">نتيجتك في قسم (${sectionData.title})</h3>
                            <div class="text-5xl font-bold text-${theme}-600" style="direction: ltr">
                                ${toArabicNum(progress.score)} <span class="text-4xl text-slate-300 font-medium">/</span> ${toArabicNum(progress.total)}
                            </div>
                        </div>
                    `;
                }

                html += this.renderSectionFooterControls(sectionId, isComplete);
                return html;
            },

            renderSectionFooterControls(sectionId, isComplete) {
                const sectionData = APP_DATA.sections.find(s => s.id === sectionId);
                const isLast = sectionId === APP_DATA.sections[APP_DATA.sections.length - 1].id;
                
                return `
                    <div class="mt-8 flex flex-col md:flex-row justify-center items-center gap-4 mx-auto w-full">
                        <button onclick="App.handleResetSection('${sectionId}')" class="w-full md:w-auto px-8 py-3 md:py-4 rounded-full font-semibold text-xl md:text-2xl text-slate-600 bg-slate-100 hover:bg-slate-200 active:scale-95 transition-transform flex items-center justify-center gap-3">
                            ${ICONS.refresh} إعادة المحاولة
                        </button>

                        ${!isLast ? `
                            <button onclick="App.handleNextSection()" class="w-full md:w-auto px-8 md:px-10 py-3 md:py-4 rounded-full font-semibold text-xl md:text-2xl text-white shadow-md transition-transform flex items-center justify-center gap-3 active:scale-95 bg-${sectionData.theme}-600 hover:bg-${sectionData.theme}-700">
                                القسم التالي ${ICONS.arrowLeft}
                            </button>
                        ` : ''}
                    </div>
                `;
            },

            // ================= دوال التفاعل (Event Handlers) =================

            toggleHint(sectionId, idx) {
                const sectionDef = APP_DATA.sections.find(s => s.id === sectionId);
                
                if (sectionDef.type === 'classify') {
                    const q = this.state.sectionData[sectionId].questions[idx];
                    q.showHint = !q.showHint;
                    q.hintAnimate = q.showHint; 
                    this.updateUI();
                    q.hintAnimate = false; 
                } else {
                    const qState = this.state.sectionData[sectionId][idx];
                    qState.showHint = !qState.showHint;
                    qState.hintAnimate = qState.showHint; 
                    
                    const cardHtml = sectionDef.type === 'spotting' ? 
                        this.renderSpottingCard(qState, idx, sectionDef.theme, sectionId) :
                        this.renderQuestionCard(qState, idx, sectionId, sectionDef.theme, sectionDef.type);
                        
                    document.getElementById(`${sectionId}-wrapper-${idx}`).innerHTML = cardHtml;
                    qState.hintAnimate = false; 
                }
            },

            handleAnswer(sectionId, qIndex, optIndex) {
                const qState = this.state.sectionData[sectionId][qIndex];
                if (qState.answered) return;
                
                const selectedOption = qState.options[optIndex];
                qState.answered = true;
                qState.selectedOption = selectedOption;
                qState.answerAnimate = true; 
                
                this.recordProgress(sectionId, selectedOption.isCorrect);
                
                const progress = this.state.progress[sectionId];
                if (progress.answered === progress.total) {
                    this.updateUI();
                } else {
                    const sectionDef = APP_DATA.sections.find(s => s.id === sectionId);
                    document.getElementById(`${sectionId}-wrapper-${qIndex}`).innerHTML = this.renderQuestionCard(qState, qIndex, sectionId, sectionDef.theme, sectionDef.type);
                    this.updateTabs();
                    this.checkFinalEvaluation();
                }
                qState.answerAnimate = false; 
            },

            handleSpottingClick(sectionId, qIndex, wIndex) {
                const qState = this.state.sectionData[sectionId][qIndex];
                if (qState.answered) return;
                
                qState.answered = true;
                qState.selectedIndex = wIndex;
                qState.answerAnimate = true; 
                
                const isCorrect = wIndex === qState.originalQuestion.correctIndex;
                this.recordProgress(sectionId, isCorrect);
                
                const progress = this.state.progress[sectionId];
                if (progress.answered === progress.total) {
                    this.updateUI();
                } else {
                    const sectionDef = APP_DATA.sections.find(s => s.id === sectionId);
                    document.getElementById(`${sectionId}-wrapper-${qIndex}`).innerHTML = this.renderSpottingCard(qState, qIndex, sectionDef.theme, sectionId);
                    this.updateTabs();
                    this.checkFinalEvaluation();
                }
                qState.answerAnimate = false; 
            },

            handleSortClick(sectionId, categoryId) {
                const state = this.state.sectionData[sectionId];
                if (state.status !== 'idle') return;

                const currentQ = state.questions[state.currentIndex].originalQuestion;
                const isCorrect = categoryId === currentQ.categoryId;
                
                state.status = isCorrect ? 'correct' : 'incorrect';
                if (isCorrect) state.boxCounts[categoryId]++;
                
                state.feedbackAnimate = true; 
                
                this.recordProgress(sectionId, isCorrect);
                this.updateUI();
                
                state.feedbackAnimate = false; 
            },

            handleSortContinue(sectionId) {
                const state = this.state.sectionData[sectionId];
                state.animatingOut = true;
                this.updateUI();
                
                setTimeout(() => {
                    state.currentIndex++;
                    state.status = 'idle';
                    state.animatingOut = false;
                    this.updateUI();
                }, 300);
            },

            recordProgress(sectionId, isCorrect) {
                this.state.progress[sectionId].answered++;
                if (isCorrect) this.state.progress[sectionId].score++;
            },

            // ================= دوال التصفح وإعادة الضبط =================

            scrollToContent() {
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        const target = document.getElementById('scroll-target');
                        if (target) {
                            const stickyTabs = document.getElementById('sticky-tabs-container');
                            const headerOffset = stickyTabs ? stickyTabs.offsetHeight : 80;
                            const elementPosition = target.getBoundingClientRect().top;
                            const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                            window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                        }
                    }, 30); 
                });
            },

            scrollTabIntoView(tabId) {
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        const tabBtn = document.getElementById(`tab-${tabId}`);
                        const container = document.getElementById('tabs-container');
                        if (tabBtn && container) {
                            const containerRect = container.getBoundingClientRect();
                            const btnRect = tabBtn.getBoundingClientRect();
                            if (tabId === APP_DATA.sections[0].id) {
                                const scrollDelta = (btnRect.right - containerRect.right) + 16;
                                container.scrollBy({ left: scrollDelta, behavior: 'smooth' });
                            } else {
                                const scrollDelta = (btnRect.left + btnRect.width / 2) - (containerRect.left + containerRect.width / 2);
                                container.scrollBy({ left: scrollDelta, behavior: 'smooth' });
                            }
                        }
                    }, 30);
                });
            },

            handleTabChange(tabId) {
                this.state.activeTab = tabId;
                this.updateUI();
                this.scrollToContent();
                this.scrollTabIntoView(tabId);
            },

            handleNextSection() {
                const currentIndex = APP_DATA.sections.findIndex(s => s.id === this.state.activeTab);
                if (currentIndex < APP_DATA.sections.length - 1) {
                    this.handleTabChange(APP_DATA.sections[currentIndex + 1].id);
                }
            },

            handleResetSection(sectionId) {
                const secDef = APP_DATA.sections.find(s => s.id === sectionId);
                this.state.progress[sectionId].answered = 0;
                this.state.progress[sectionId].score = 0;
                
                if (secDef.type === 'mcq' || secDef.type === 'true_false' || secDef.type === 'spotting') {
                    let newData = shuffleArray(secDef.questions).map(q => {
                        let options = [];
                        if (secDef.type === 'mcq') {
                            options = q.options.map((opt, oIdx) => ({ text: opt, isCorrect: oIdx === q.correct }));
                        } else if (secDef.type === 'true_false') {
                            options = [
                                { text: "صواب", isCorrect: true === q.answer },
                                { text: "خطأ", isCorrect: false === q.answer }
                            ];
                        }
                        return { originalQuestion: q, options, answered: false, selectedOption: null, selectedIndex: null, showHint: false };
                    });
                    this.state.sectionData[sectionId] = newData;
                } else if (secDef.type === 'classify') {
                    let boxCounts = {};
                    secDef.categories.forEach(c => boxCounts[c.id] = 0);
                    this.state.sectionData[sectionId] = {
                        questions: shuffleArray(secDef.questions).map(q => ({ originalQuestion: q, showHint: false })),
                        currentIndex: 0, status: 'idle', boxCounts: boxCounts, animatingOut: false
                    };
                }
                
                this.updateUI();
                this.scrollToContent();
            },

            handleGlobalRestart() {
                this.initSectionData();
                if (APP_DATA.sections.length > 0) this.state.activeTab = APP_DATA.sections[0].id;
                this.updateUI();
                this.scrollTabIntoView(this.state.activeTab);
                requestAnimationFrame(() => {
                    const header = document.getElementById('main-header');
                    const targetTop = header ? header.offsetHeight : 80;
                    window.scrollTo({ top: targetTop, behavior: 'smooth' });
                });
            },

            checkFinalEvaluation() {
                const scorableSections = APP_DATA.sections.filter(s => s.type !== 'intro');
                if (scorableSections.length === 0) return;

                const isAllComplete = scorableSections.every(s => {
                    const p = this.state.progress[s.id];
                    return p && p.total > 0 && p.answered === p.total;
                });

                const container = document.getElementById('final-evaluation-container');
                const activeSecDef = APP_DATA.sections.find(s => s.id === this.state.activeTab);
                
                if (isAllComplete && activeSecDef.type !== 'intro') {
                    let totalScore = 0, totalQuestions = 0;
                    scorableSections.forEach(s => {
                        totalScore += this.state.progress[s.id].score;
                        totalQuestions += this.state.progress[s.id].total;
                    });

                    const percentage = Math.round((totalScore / totalQuestions) * 100);
                    
                    let message = "", color = "";
                    if (percentage < 60) { message = "تحتاج إلى مزيد من التدريب، لا تيأس وحاول مرة أخرى!"; color = "text-rose-600"; }
                    else if (percentage < 85) { message = "أداء رائع! مستواك جيد جدًا."; color = "text-violet-600"; }
                    else { message = "أداء استثنائي! أنت بطل حقيقي وخبير في هذا الدرس."; color = "text-emerald-600"; }

                    container.innerHTML = `
                        <div id="final-eval-box" class="mt-12 bg-white p-8 md:p-12 rounded-3xl shadow-lg border-2 border-amber-200 text-center fade-in">
                            ${ICONS.medal}
                            <h2 class="text-3xl md:text-4xl font-bold text-slate-700 mb-4">التقييم النهائي</h2>
                            <div class="text-6xl md:text-8xl font-bold mb-6 text-slate-700" style="direction: ltr">
                                <span class="${color}">${toArabicNum(totalScore)}</span>
                                <span class="text-slate-300 text-5xl font-medium">/</span>
                                <span class="text-slate-500">${toArabicNum(totalQuestions)}</span>
                            </div>
                            <div class="inline-block bg-amber-100 text-amber-800 px-6 py-2 rounded-full font-semibold text-xl md:text-2xl mb-6">
                                النسبة المئوية: ${toArabicNum(percentage)}%
                            </div>
                            <p class="text-xl md:text-2xl font-semibold leading-relaxed ${color} mb-10">${message}</p>
                            <button onclick="App.handleGlobalRestart()" class="px-8 md:px-10 py-3 md:py-4 rounded-full font-semibold text-xl md:text-2xl text-white bg-slate-700 hover:bg-slate-800 shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-3 mx-auto">
                                ${ICONS.refresh} ابدأ من جديد
                            </button>
                        </div>
                    `;
                } else {
                    container.innerHTML = '';
                }
            }
        };

        // تشغيل التطبيق فور تحميل المستند
        document.addEventListener('DOMContentLoaded', () => {
            try {
                if ('scrollRestoration' in history) {
                    history.scrollRestoration = 'manual';
                }
                window.scrollTo(0, 0);
            } catch (error) {
                console.warn("تم تجاهل ضبط التمرير.", error);
            }

            App.init();
        });

    </script>
</body>
</html>
